services:
  - type: web
    name: channelwire-api
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CHANNELWIRE_DATABASE_URL
        sync: false
      - key: CHANNELWIRE_DB_SCHEMA
        value: channelwire
      - key: CHANNELWIRE_JWT_SECRET
        generateValue: true
      - key: CHANNELWIRE_ENABLE_DEV_TOKEN
        value: "0"
      - key: CHANNELWIRE_CORS_ORIGINS
        sync: false
      - key: CHANNELWIRE_CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
