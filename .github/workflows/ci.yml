name: CI

on:
  push:
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build C core
        run: make
      - name: Run integration test
        run: make test
      - name: Run concurrent load test
        run: make test-load
      - name: Run slow-reader backpressure test
        run: make test-backpressure
      - name: Run malformed protocol test
        run: make test-malformed
      - name: Install gateway dependencies
        run: python3 -m pip install -r gateway/requirements.txt
      - name: Run gateway smoke test
        run: make test-gateway
      - name: Sanitizer build
        run: make sanitize
      - name: Run sanitizer integration test
        run: make test
      - name: Run sanitizer backpressure test
        run: make test-backpressure
      - name: Run sanitizer malformed protocol test
        run: make test-malformed
      - name: Run sanitizer gateway smoke test
        run: make test-gateway
      - name: Build React dashboard
        run: make frontend-build
      - name: Validate Docker image build
        run: docker compose build
      - name: Run Docker Compose smoke test
        run: make test-compose
